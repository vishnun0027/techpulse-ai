name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:            # ← no push trigger needed for this one

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: curl -s -o /dev/null "$SUPABASE_URL/rest/v1/"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}