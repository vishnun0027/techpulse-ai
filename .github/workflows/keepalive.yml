name: Keep Supabase Alive

on:
  schedule:
    # Runs once a week at 9:00 UTC on Mondays
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Keepalive run
        run: uv run python -c "print('Keeping workflows active')"