name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:            # ← no push trigger needed for this one

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keepalive run
        run: uv run python -c "print('Keeping workflow active')"
    env:
      PYTHONPATH: src